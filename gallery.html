<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

    
<title>Site Gallery</title>
    
<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">

<style>

body {

    max-width: 1200px;
    margin: auto;
    padding: 20px;
    font-family: Arial, sans-serif;

}

#gallery a {

    display: block;

}

#gallery img {

    width: 100%;

    height: 250px;

    object-fit: cover;

    border-radius: 8px;

    display: block;

}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="gallery"></div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const site =
    params.get('site');

fetch('data/gallery.json')

.then(response => response.json())

.then(data => {

    const gallery =
        data[site];

    document
        .getElementById('title')
        .textContent =
            gallery.title;

    const container =
        document
            .getElementById(
                'gallery'
            );

    gallery.photos.forEach(photo => {

    const link =
        document.createElement(
            'a'
        );

    link.href =
        'images/' +
        site +
        '/' +
        photo;

    link.dataset.pswpWidth =
        1600;

    link.dataset.pswpHeight =
        1200;

    const img =
        document.createElement(
            'img'
        );

    img.src =
        link.href;

    img.onerror = function() {

        link.remove();

    };

    link.appendChild(
        img
    );

    container.appendChild(
        link
    );

});

 <script type="module">

import PhotoSwipeLightbox
from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

const lightbox =
new PhotoSwipeLightbox({

    gallery: '#gallery',

    children: 'a',

    pswpModule: () =>
        import(
'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js'
        )

});

lightbox.init();

</script>

</body>

</html>
