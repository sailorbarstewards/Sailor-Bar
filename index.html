<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
 src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
html, body, #map {
  height:100%;
  margin:0;
}

#opacity-control {
 position: absolute;
 top: 90px;
 right: 10px;

 background: white;
 padding: 10px;
 z-index: 1000;
 border-radius: 4px;
 box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div id="map"></div>

<div id="opacity-control">
 Hillshade Opacity
 <input
  type="range"
  id="opacity-slider"
  min="0"
  max="100"
  value="50">

</div>

<script>

var map = L.map('map').setView([38.638, -121.244], 16);

var esri = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:20,
attribution: 'Esri'
}
);

esri.addTo(map);


var hillshade = L.tileLayer(
'tiles/Hillshade/{z}/{x}/{y}.png',
{
maxZoom:21,
}
);

hillshade.addTo(map);

document
 .getElementById('opacity-slider')
 .addEventListener('input', function(e) {
  hillshade.setOpacity(
   e.target.value / 100
   );
 });

var baseMaps = {
 "Satellite": esri
};

var overlayMaps = {
 "Lidar Hillshade": hillshade
};

L.control.layers(baseMaps, overlayMaps).addTo(map);

</script>

</body>
</html>
