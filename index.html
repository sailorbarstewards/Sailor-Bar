<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
 src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
html, body, #map {
  height:100%;
  margin:0;
}
</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([38.638, -121.244], 16);

var hillshade = L.titleLayer('tiles/hillshade/{x}/{y}/{z}.png',
{
opacity:0.5,
maxZoom:20
}
);
 hillshade.addTo(map);

var esri = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:20,
attribution: 'Esri'
}
);

esri.addTo(map);


</script>

</body>
</html>
